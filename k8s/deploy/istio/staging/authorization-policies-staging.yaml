apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: staging-default-deny
  namespace: staging
spec:
  action: ALLOW
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-health-and-metrics
  namespace: staging
spec:
  action: ALLOW
  rules:
    - to:
        - operation:
            ports: ["8090"]
            paths:
              - /actuator/health*
              - /actuator/prometheus
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-public-to-backoffice-bff
  namespace: staging
spec:
  action: ALLOW
  selector:
    matchLabels:
      app.kubernetes.io/name: backoffice-bff
  rules:
    - to:
        - operation:
            ports: ["80"]
---
