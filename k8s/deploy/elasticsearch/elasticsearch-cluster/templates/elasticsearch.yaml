apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: elasticsearch
spec:
  http:
    tls:
      selfSignedCertificate:
        disabled: true
  version: 8.8.1
  auth:
    fileRealm:
      - secretName: user-credentials-secret
  nodeSets:
    - name: node
      count: {{ .Values.elasticsearch.replicas }}
      config:
        node.store.allow_mmap: false
      podTemplate:
        spec:
          securityContext:
            fsGroup: 1000
          initContainers:
            - name: elasticsearch-data-permissions
              image: busybox:1.36
              command:
                - sh
                - -c
                - chown -R 1000:0 /usr/share/elasticsearch/data && chmod -R g+rwX /usr/share/elasticsearch/data
              securityContext:
                runAsUser: 0
              volumeMounts:
                - name: elasticsearch-data
                  mountPath: /usr/share/elasticsearch/data
